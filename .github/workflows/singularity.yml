name: Singularity CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  singularity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Singularity
        run: |
          sudo apt-get update
          sudo apt-get install -y singularity-container

      - name: Show Singularity version
        run: singularity --version

      - name: Cache .sif image
        id: cache-sif
        uses: actions/cache@v4
        with:
          path: container.sif
          key: sif-${{ runner.os }}-${{ hashFiles('container.def', 'flake.nix', 'flake.lock') }}

      - name: Build .sif image
        if: steps.cache-sif.outputs.cache-hit != 'true'
        run: |
          singularity build --fakeroot \
            --build-arg bake_dotfiles=0 \
            container.sif container.def

      - name: Verify baked tools
        run: |
          singularity run \
            --bind "$PWD:/workspace" \
            container.sif init
          singularity exec \
            --bind "$PWD:/workspace" \
            container.sif bash -lc 'python --version && nix --version && direnv --version'
          singularity run \
            --bind "$PWD:/workspace" \
            container.sif direnv allow
          singularity run \
            --bind "$PWD:/workspace" \
            container.sif direnv exec . bash -lc 'test -n "$VIRTUAL_ENV" && uv --version'
