name: Singularity CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  singularity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up SingularityCE
        uses: eWaterCycle/setup-singularity@v7
        with:
          singularity-version: 4.1.5

      - name: Cache .sif image
        id: cache-sif
        uses: actions/cache@v4
        with:
          path: container.sif
          key: sif-${{ runner.os }}-${{ hashFiles('container.def') }}

      - name: Build .sif image
        if: steps.cache-sif.outputs.cache-hit != 'true'
        run: sudo -E singularity build container.sif container.def

      - name: Sync dependencies (inside container)
        run: |
          singularity exec --bind "$PWD:/workspace" container.sif \
            bash -c "cd /workspace && uv sync"

      - name: Lint (ruff)
        run: |
          singularity exec --bind "$PWD:/workspace" container.sif \
            bash -c "cd /workspace && uv run ruff check ."

      - name: Type check (ty)
        run: |
          singularity exec --bind "$PWD:/workspace" container.sif \
            bash -c "cd /workspace && uv run ty check"

      - name: Tests (pytest)
        run: |
          singularity exec --bind "$PWD:/workspace" container.sif \
            bash -c "cd /workspace && uv run pytest tests src"
